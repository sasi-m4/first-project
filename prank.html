<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Important System Scan 😳</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      text-align: center;
      padding-top: 100px;
    }

    .hidden {
      display: none;
    }

    #scare {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: white;
      color: black;
      font-size: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      display: none;
    }

    .shake {
      animation: shake 0.3s infinite;
    }

    @keyframes shake {
      0% { transform: translate(2px, 2px); }
      25% { transform: translate(-2px, -2px); }
      50% { transform: translate(2px, -2px); }
      75% { transform: translate(-2px, 2px); }
      100% { transform: translate(2px, 2px); }
    }
  </style>
</head>
<body>

  <h1>🔍 Scanning Device...</h1>
  <div class="progress w-50 mx-auto mt-4">
    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 0%"></div>
  </div>

  <p id="status" class="mt-3">Initializing...</p>

  <div id="result" class="hidden mt-5">
    <h2>⚠️ VIRUS DETECTED ⚠️</h2>
    <p>Deleting all photos of you... 😈</p>
    <button class="btn btn-danger mt-3" onclick="triggerPrank()">STOP IT!!!</button>
  </div>

  <div id="scare">😂 GOT YOU AKKA 😂</div>

  <script>
    let progress = 0;
    let bar = document.getElementById("progressBar");
    let status = document.getElementById("status");

    let messages = [
      "Checking WhatsApp chats...",
      "Reading embarrassing photos...",
      "Uploading to family group 😏...",
      "Almost done..."
    ];

    let interval = setInterval(() => {
      progress += Math.random() * 15;
      bar.style.width = progress + "%";

      if (progress > 20) status.innerText = messages[0];
      if (progress > 40) status.innerText = messages[1];
      if (progress > 60) status.innerText = messages[2];
      if (progress > 80) status.innerText = messages[3];

      if (progress >= 100) {
        clearInterval(interval);
        bar.style.width = "100%";
        status.innerText = "Scan Complete!";
        document.getElementById("result").classList.remove("hidden");
        document.body.classList.add("shake");
      }
    }, 500);

    function triggerPrank() {
      document.getElementById("scare").style.display = "flex";
      document.body.classList.remove("shake");

      setTimeout(() => {
        alert("Relax akka 😂 It’s just a prank!");
      }, 500);
    }

    // Random annoying popup
    setInterval(() => {
      if (Math.random() > 0.7) {
        alert("⚠️ Warning: Too much attitude detected!");
      }
    }, 4000);
  </script>

</body>
</html>
